# Docker Compose overlay for Python services
# Use alongside services/playground/docker-compose.fork.yml

services:
  orderbook-py:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ../services/playground/configs/orderbook.toml:/config/orderbook.toml:ro
    environment:
      DB_WRITE_URL: postgresql://postgres:postgres@db:5432/cowprotocol
      DB_READ_URL: postgresql://postgres:postgres@db:5432/cowprotocol
    command: ["cow-orderbook", "--config", "/config/orderbook.toml"]
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cowprotocol
    ports:
      - "5432:5432"
