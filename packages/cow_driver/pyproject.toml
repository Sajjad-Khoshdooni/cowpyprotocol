[project]
name = "cow-driver"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "cow-configs",
    "cow-ethrpc",
    "cow-solver",
    "cow-simulator",
    "cow-liquidity-sources",
    "cow-observe",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "typer>=0.12",
    "httpx>=0.27",
]

[project.scripts]
cow-driver = "cow_driver.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cow_driver"]

[tool.uv.sources]
cow-configs = { workspace = true }
cow-ethrpc = { workspace = true }
cow-solver = { workspace = true }
cow-simulator = { workspace = true }
cow-liquidity-sources = { workspace = true }
cow-observe = { workspace = true }
