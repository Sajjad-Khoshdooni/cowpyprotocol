[project]
name = "cow-autopilot"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "cow-configs",
    "cow-database",
    "cow-ethrpc",
    "cow-solver",
    "cow-observe",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "typer>=0.12",
    "httpx>=0.27",
    "aioboto3>=13.0",
]

[project.scripts]
cow-autopilot = "cow_autopilot.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cow_autopilot"]

[tool.uv.sources]
cow-configs = { workspace = true }
cow-database = { workspace = true }
cow-ethrpc = { workspace = true }
cow-solver = { workspace = true }
cow-observe = { workspace = true }
