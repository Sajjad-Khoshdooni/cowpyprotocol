[project]
name = "cow-shared"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "cow-model",
    "cow-ethrpc",
    "cow-contracts",
    "cow-configs",
    "eth-account>=0.13",
    "eth-keys>=0.5",
    "web3>=7.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cow_shared"]

[tool.uv.sources]
cow-model = { workspace = true }
cow-ethrpc = { workspace = true }
cow-contracts = { workspace = true }
cow-configs = { workspace = true }
