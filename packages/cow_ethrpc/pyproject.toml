[project]
name = "cow-ethrpc"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "cow-chain",
    "web3>=7.0",
    "websockets>=13.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cow_ethrpc"]

[tool.uv.sources]
cow-chain = { workspace = true }
