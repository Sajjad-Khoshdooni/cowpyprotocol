[project]
name = "cow-observe"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "prometheus-client>=0.21",
    "structlog>=24.0",
]

[project.optional-dependencies]
nats = ["nats-py>=2.9"]
otel = ["opentelemetry-sdk>=1.27", "opentelemetry-exporter-otlp>=1.27"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cow_observe"]
