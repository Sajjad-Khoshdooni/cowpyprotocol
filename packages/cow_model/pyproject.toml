[project]
name = "cow-model"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "cow-number",
    "cow-bytes-hex",
    "pydantic>=2.0",
    "eth-utils>=4.0",
    "eth-hash[pycryptodome]>=0.7",
    "eth-account>=0.13",
]

[tool.uv.sources]
cow-number = { workspace = true }
cow-bytes-hex = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cow_model"]
