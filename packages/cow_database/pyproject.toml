[project]
name = "cow-database"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "asyncpg>=0.30",
    "cow-bytes-hex",
    "cow-configs",
    "cow-model",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cow_database"]

[tool.uv.sources]
cow-bytes-hex = { workspace = true }
cow-configs = { workspace = true }
cow-model = { workspace = true }
