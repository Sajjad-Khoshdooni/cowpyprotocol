[project]
name = "cow-simulator"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = ["cow-ethrpc", "cow-contracts", "web3>=7.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cow_simulator"]

[tool.uv.sources]
cow-ethrpc = { workspace = true }
cow-contracts = { workspace = true }
