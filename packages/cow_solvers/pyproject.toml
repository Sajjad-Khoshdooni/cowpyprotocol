[project]
name = "cow-solvers"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "cow-solver",
    "cow-liquidity-sources",
    "cow-observe",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "typer>=0.12",
]

[project.scripts]
cow-solvers = "cow_solvers.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cow_solvers"]

[tool.uv.sources]
cow-solver = { workspace = true }
cow-liquidity-sources = { workspace = true }
cow-observe = { workspace = true }
