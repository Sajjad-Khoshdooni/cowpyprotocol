[project]
name = "cow-solana-indexer"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "cow-database",
    "cow-observe",
    "typer>=0.12",
]

[project.optional-dependencies]
grpc = ["grpcio>=1.68"]

[project.scripts]
cow-solana-indexer = "cow_solana_indexer.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cow_solana_indexer"]

[tool.uv.sources]
cow-database = { workspace = true }
cow-observe = { workspace = true }
