[project]
name = "cow-refunder"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "cow-database",
    "cow-ethrpc",
    "cow-observe",
    "typer>=0.12",
]

[project.scripts]
cow-refunder = "cow_refunder.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cow_refunder"]

[tool.uv.sources]
cow-database = { workspace = true }
cow-ethrpc = { workspace = true }
cow-observe = { workspace = true }
